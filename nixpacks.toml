[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "ffmpeg"]

[phases.install]
cmds = ["python3.11 -m pip install -r requirements.txt"]

[phases.build]
cmds = ["python3.11 manage.py migrate --noinput", "python3.11 manage.py collectstatic --noinput"]

[start]
cmd = "gunicorn kaizer_news.wsgi --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
